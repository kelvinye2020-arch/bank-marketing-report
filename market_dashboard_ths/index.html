<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>全球指数看板 | Global Index Dashboard (THS)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-card-hover: #1f2a40;
            --border: #2a3654;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --yellow: #f59e0b;
            --orange: #f97316;
            --purple: #8b5cf6;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid var(--border); padding: 14px 32px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold;
        }
        .header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .status-badge {
            display: flex; align-items: center; gap: 8px; padding: 5px 12px;
            background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px; font-size: 12px; color: var(--accent-blue);
        }
        .data-source-tag {
            padding: 4px 10px; background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 6px;
            font-size: 11px; color: var(--yellow); font-weight: 600;
        }
        .update-time { font-size: 12px; color: var(--text-muted); }
        .main { max-width: 1800px; margin: 0 auto; padding: 20px 32px; }
        .index-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
        .index-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px 18px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .index-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            opacity: 0; transition: opacity 0.3s;
        }
        .index-card:hover { background: var(--bg-card-hover); border-color: var(--accent-blue); transform: translateY(-2px); box-shadow: var(--shadow); }
        .index-card:hover::before, .index-card.active::before { opacity: 1; }
        .index-card.active { border-color: var(--accent-blue); background: var(--bg-card-hover); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .card-name { font-size: 14px; font-weight: 600; }
        .card-code { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        .card-price { font-size: 26px; font-weight: 700; margin-bottom: 6px; font-feature-settings: 'tnum'; letter-spacing: -0.5px; }
        .card-change { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; }
        .card-change span { display: flex; align-items: center; gap: 3px; }
        .up { color: var(--red); }
        .down { color: var(--green); }
        .flat { color: var(--text-muted); }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .ytd-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .ytd-badge.positive { background: var(--red-bg); color: var(--red); }
        .ytd-badge.negative { background: var(--green-bg); color: var(--green); }
        .card-market { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .card-sparkline { margin-top: 8px; height: 36px; }
        .stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 18px; }
        .stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-align: center; }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 18px; font-weight: 700; font-feature-settings: 'tnum'; }
        .stat-sub { font-size: 11px; margin-top: 3px; }
        .charts-section { display: grid; grid-template-columns: 1fr; gap: 18px; }
        .chart-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .chart-title { font-size: 16px; font-weight: 700; }
        .chart-area { width: 100%; height: 420px; }
        .chart-area-compare { width: 100%; height: 400px; }
        .footer {
            text-align: center; padding: 20px; font-size: 11px; color: var(--text-muted);
            border-top: 1px solid var(--border); margin-top: 24px;
        }
        .footer a { color: var(--accent-blue); text-decoration: none; }
        .market-flag { font-size: 14px; margin-right: 2px; }
        @media (max-width: 1400px) { .index-cards { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1100px) { .index-cards { grid-template-columns: repeat(3, 1fr); } .stats-row { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) {
            .header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
            .main { padding: 14px 16px; }
            .index-cards { grid-template-columns: repeat(2, 1fr); }
            .card-price { font-size: 20px; }
            .chart-area { height: 340px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        }
    };

    const INDEX_ORDER = ["sh_composite", "cyb", "hsi", "hstech", "nikkei", "kospi", "nasdaq", "sp500"];
    let activeIndex = "sh_composite";
    let mainChartInstance = null;
    let compareChartInstance = null;

    // ======== 初始化 ========
    document.addEventListener("DOMContentLoaded", () => {
        mainChartInstance = echarts.init(document.getElementById("mainChart"));
        compareChartInstance = echarts.init(document.getElementById("compareChart"));
        window.addEventListener("resize", () => {
            mainChartInstance && mainChartInstance.resize();
            compareChartInstance && compareChartInstance.resize();
        });
        renderAll();
    });

    function renderAll() {
        renderCards();
        renderStats();
        renderMainChart();
        renderCompareChart();
    }

    // ======== 卡片渲染 ========
    function renderCards() {
        const container = document.getElementById("indexCards");
        container.innerHTML = "";

        INDEX_ORDER.forEach(key => {
            const meta = RAW_DATA[key];
            const closes = meta.data.map(d => d[1]);
            const dates = meta.data.map(d => d[0]);
            const lastPrice = closes[closes.length - 1];
            const prevPrice = closes.length > 1 ? closes[closes.length - 2] : lastPrice;
            const firstPrice = closes[0];

            const dayChange = lastPrice - prevPrice;
            const dayChangePct = prevPrice > 0 ? ((lastPrice - prevPrice) / prevPrice * 100) : 0;
            const ytdPct = firstPrice > 0 ? ((lastPrice - firstPrice) / firstPrice * 100) : 0;

            const colorClass = dayChangePct > 0 ? "up" : dayChangePct < 0 ? "down" : "flat";
            const isUp = dayChangePct >= 0;

            const card = document.createElement("div");
            card.className = `index-card ${key === activeIndex ? "active" : ""}`;
            card.onclick = () => selectIndex(key);

            card.innerHTML = `
                <div class="card-header">
                    <span class="card-name"><span class="market-flag">${meta.market.split(' ')[0]}</span> ${meta.name}</span>
                    <span class="card-code">${meta.short}</span>
                </div>
                <div class="card-price ${colorClass}">${fmtNum(lastPrice)}</div>
                <div class="card-change">
                    <span class="${colorClass}">
                        ${isUp ? "&#9650;" : dayChangePct < 0 ? "&#9660;" : "&#9644;"}
                        ${fmtNum(Math.abs(dayChange))}
                    </span>
                    <span class="${colorClass}">
                        ${isUp ? "+" : ""}${dayChangePct.toFixed(2)}%
                    </span>
                </div>
                <div class="card-footer">
                    <div class="ytd-badge ${ytdPct >= 0 ? "positive" : "negative"}">YTD ${ytdPct >= 0 ? "+" : ""}${ytdPct.toFixed(2)}%</div>
                    <div class="card-market">${meta.market}</div>
                </div>
                <div class="card-sparkline" id="spark-${key}"></div>
            `;

            container.appendChild(card);
            setTimeout(() => renderSparkline(`spark-${key}`, closes, meta.color), 50);
        });
    }

    function renderSparkline(containerId, data, color) {
        const el = document.getElementById(containerId);
        if (!el || data.length === 0) return;
        const chart = echarts.init(el);
        chart.setOption({
            grid: { top: 2, bottom: 2, left: 0, right: 0 },
            xAxis: { show: false, type: "category", data: data.map((_, i) => i) },
            yAxis: { show: false, type: "value", min: "dataMin", max: "dataMax" },
            series: [{
                type: "line", data: data, showSymbol: false,
                lineStyle: { width: 1.5, color: color },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: color + "40" },
                        { offset: 1, color: color + "05" },
                    ])
                },
            }]
        });
        window.addEventListener("resize", () => chart.resize());
    }

    // ======== 统计栏 ========
    function renderStats() {
        const container = document.getElementById("statsRow");
        const meta = RAW_DATA[activeIndex];
        const closes = meta.data.map(d => d[1]);
        const dates = meta.data.map(d => d[0]);

        if (closes.length === 0) { container.innerHTML = ""; return; }

        const firstClose = closes[0], lastClose = closes[closes.length - 1];
        const maxHigh = Math.max(...closes), minLow = Math.min(...closes);
        const ytdReturn = ((lastClose - firstClose) / firstClose * 100);

        let dailyReturns = [];
        for (let i = 1; i < closes.length; i++) {
            dailyReturns.push((closes[i] - closes[i-1]) / closes[i-1]);
        }
        const avgReturn = dailyReturns.length > 0 ? dailyReturns.reduce((a, b) => a + b, 0) / dailyReturns.length : 0;
        const variance = dailyReturns.length > 0 ? dailyReturns.reduce((a, b) => a + Math.pow(b - avgReturn, 2), 0) / dailyReturns.length : 0;
        const volatility = Math.sqrt(variance) * Math.sqrt(252) * 100;

        const ytdClass = ytdReturn >= 0 ? "up" : "down";

        container.innerHTML = `
            <div class="stat-item">
                <div class="stat-label">起始点位</div>
                <div class="stat-value">${fmtNum(firstClose)}</div>
                <div class="stat-sub" style="color:var(--text-muted)">${dates[0]}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最新点位</div>
                <div class="stat-value">${fmtNum(lastClose)}</div>
                <div class="stat-sub" style="color:var(--text-muted)">${dates[dates.length - 1]}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">区间最高</div>
                <div class="stat-value" style="color:var(--red)">${fmtNum(maxHigh)}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">区间最低</div>
                <div class="stat-value" style="color:var(--green)">${fmtNum(minLow)}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">区间涨跌</div>
                <div class="stat-value ${ytdClass}">${ytdReturn >= 0 ? "+" : ""}${ytdReturn.toFixed(2)}%</div>
                <div class="stat-sub" style="color:var(--text-muted)">波动率 ${volatility.toFixed(1)}%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">交易日数</div>
                <div class="stat-value" style="color:var(--accent-cyan)">${closes.length}</div>
                <div class="stat-sub" style="color:var(--text-muted)">2026 YTD</div>
            </div>
        `;
    }

    // ======== 主图表 ========
    function renderMainChart() {
        const meta = RAW_DATA[activeIndex];
        const closes = meta.data.map(d => d[1]);
        const dates = meta.data.map(d => d[0]);

        document.getElementById("chartTitle").textContent = `${meta.name} - 日线走势`;

        const option = {
            backgroundColor: "transparent",
            tooltip: {
                trigger: "axis",
                axisPointer: { type: "cross", crossStyle: { color: "#6b7280" } },
                backgroundColor: "rgba(15, 23, 42, 0.95)",
                borderColor: "rgba(59, 130, 246, 0.3)",
                textStyle: { color: "#e5e7eb", fontSize: 13 },
                formatter: function(params) {
                    const idx = params[0].dataIndex;
                    const close = closes[idx];
                    const prevClose = idx > 0 ? closes[idx - 1] : close;
                    const chg = prevClose > 0 ? ((close - prevClose) / prevClose * 100) : 0;
                    const chgColor = chg >= 0 ? "#ef4444" : "#10b981";
                    const ytd = ((close - closes[0]) / closes[0] * 100);
                    const ytdColor = ytd >= 0 ? "#ef4444" : "#10b981";
                    return `
                        <div style="font-weight:600;margin-bottom:6px">${dates[idx]}</div>
                        <div>收盘: <b>${fmtNum(close)}</b></div>
                        <div style="color:${chgColor};font-weight:600;margin-top:4px">日涨跌: ${chg >= 0 ? "+" : ""}${chg.toFixed(2)}%</div>
                        <div style="color:${ytdColor};margin-top:2px">YTD: ${ytd >= 0 ? "+" : ""}${ytd.toFixed(2)}%</div>
                    `;
                }
            },
            grid: { top: 40, bottom: 60, left: 70, right: 40 },
            xAxis: {
                type: "category", data: dates,
                axisLine: { lineStyle: { color: "#2a3654" } },
                axisTick: { show: false },
                axisLabel: { color: "#6b7280", fontSize: 11 },
                splitLine: { show: false },
            },
            yAxis: {
                type: "value", min: "dataMin", max: "dataMax",
                axisLine: { show: false }, axisTick: { show: false },
                axisLabel: { color: "#6b7280", fontSize: 11 },
                splitLine: { lineStyle: { color: "#1e293b", type: "dashed" } },
            },
            dataZoom: [
                { type: "inside", start: 0, end: 100 },
                { type: "slider", start: 0, end: 100, height: 20, bottom: 6,
                  borderColor: "transparent", backgroundColor: "rgba(255,255,255,0.03)",
                  fillerColor: "rgba(59,130,246,0.15)",
                  handleStyle: { color: "#3b82f6", borderColor: "#3b82f6" },
                  textStyle: { color: "#6b7280" } }
            ],
            series: [{
                name: meta.name, type: "line", data: closes,
                showSymbol: false, smooth: 0.3,
                lineStyle: { width: 2, color: meta.color },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: meta.color + "50" },
                        { offset: 0.5, color: meta.color + "20" },
                        { offset: 1, color: meta.color + "02" },
                    ])
                },
                markLine: {
                    silent: true, symbol: "none",
                    data: [{
                        yAxis: closes[0],
                        label: { formatter: `年初 ${fmtNum(closes[0])}`, color: "#f59e0b", fontSize: 11 },
                        lineStyle: { color: "#f59e0b", type: "dashed", width: 1 }
                    }]
                }
            }],
        };

        mainChartInstance.setOption(option, true);
    }

    // ======== 对比图表 ========
    function renderCompareChart() {
        const series = [];
        const legendData = [];

        // 合并所有日期
        const allDatesSet = new Set();
        INDEX_ORDER.forEach(key => {
            RAW_DATA[key].data.forEach(d => allDatesSet.add(d[0]));
        });
        const mergedDates = Array.from(allDatesSet).sort();

        INDEX_ORDER.forEach(key => {
            const meta = RAW_DATA[key];
            const dateMap = {};
            meta.data.forEach(d => { dateMap[d[0]] = d[1]; });

            const base = meta.data[0][1];
            const aligned = mergedDates.map(d => {
                if (dateMap[d] !== undefined) {
                    return +((dateMap[d] - base) / base * 100).toFixed(4);
                }
                return null;
            });

            legendData.push(meta.name);
            series.push({
                name: meta.name, type: "line", data: aligned,
                showSymbol: false, smooth: 0.2, connectNulls: true,
                itemStyle: { color: meta.color },
                lineStyle: { width: 2, color: meta.color },
                emphasis: { lineStyle: { width: 3 } },
            });
        });

        const option = {
            backgroundColor: "transparent",
            tooltip: {
                trigger: "axis",
                backgroundColor: "rgba(15, 23, 42, 0.95)",
                borderColor: "rgba(59, 130, 246, 0.3)",
                textStyle: { color: "#e5e7eb", fontSize: 13 },
                formatter: function(params) {
                    let html = `<div style="font-weight:600;margin-bottom:6px">${params[0].axisValue}</div>`;
                    params.sort((a, b) => (b.value || 0) - (a.value || 0));
                    params.forEach(p => {
                        if (p.value == null) return;
                        const color = p.value >= 0 ? "#ef4444" : "#10b981";
                        html += `<div style="display:flex;justify-content:space-between;gap:16px">
                            <span>${p.marker} ${p.seriesName}</span>
                            <span style="color:${color};font-weight:600">${p.value >= 0 ? "+" : ""}${p.value.toFixed(2)}%</span>
                        </div>`;
                    });
                    return html;
                }
            },
            legend: {
                data: legendData, top: 0,
                textStyle: { color: "#9ca3af", fontSize: 12 },
                icon: "roundRect", itemWidth: 16, itemHeight: 3,
            },
            grid: { top: 40, bottom: 50, left: 60, right: 40 },
            xAxis: {
                type: "category", data: mergedDates,
                axisLine: { lineStyle: { color: "#2a3654" } },
                axisTick: { show: false },
                axisLabel: { color: "#6b7280", fontSize: 11 },
                splitLine: { show: false },
            },
            yAxis: {
                type: "value",
                axisLine: { show: false }, axisTick: { show: false },
                axisLabel: { color: "#6b7280", fontSize: 11, formatter: "{value}%" },
                splitLine: { lineStyle: { color: "#1e293b", type: "dashed" } },
            },
            dataZoom: [{ type: "inside", start: 0, end: 100 }],
            series: series,
        };

        compareChartInstance.setOption(option, true);
    }

    // ======== 交互 ========
    function selectIndex(key) {
        activeIndex = key;
        document.querySelectorAll(".index-card").forEach((card, i) => {
            card.classList.toggle("active", INDEX_ORDER[i] === key);
        });
        renderStats();
        renderMainChart();
    }

    // ======== 工具函数 ========
    function fmtNum(num) {
        if (num === undefined || num === null || isNaN(num)) return "--";
        return num.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
